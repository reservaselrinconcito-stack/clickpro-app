<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light">
  <!-- NO PWA meta, NO manifest — desktop app -->
  <title>ContikPro Core</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32' fill='none'><defs><linearGradient id='g' x1='0' y1='0' x2='32' y2='32' gradientUnits='userSpaceOnUse'><stop offset='0%25' stop-color='%234F46E5'/><stop offset='100%25' stop-color='%237C5CFF'/></linearGradient></defs><rect width='32' height='32' rx='8' fill='%234F46E5'/><rect x='7' y='7' width='7' height='7' rx='1.5' fill='white' opacity='.9'/><rect x='18' y='7' width='7' height='7' rx='1.5' fill='white' opacity='.35' stroke='white' stroke-width='.7' stroke-dasharray='1.5 1'/><rect x='7' y='18' width='7' height='7' rx='1.5' fill='white' opacity='.35' stroke='white' stroke-width='.7' stroke-dasharray='1.5 1'/><rect x='18' y='18' width='7' height='7' rx='1.5' fill='white' opacity='.9'/></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f3f4f6;
      color: #1f2937;
      margin: 0;
      -webkit-user-select: none;
      user-select: none;
    }

    /* Allow text selection in inputs and content areas */
    input,
    textarea,
    [contenteditable],
    .selectable {
      -webkit-user-select: text;
      user-select: text;
    }

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    input,
    select,
    textarea {
      background-color: #ffffff !important;
      color: #1f2937 !important;
      border-color: #d1d5db;
    }

    input::placeholder,
    textarea::placeholder {
      color: #9ca3af !important;
    }

    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus,
    textarea:-webkit-autofill,
    select:-webkit-autofill {
      -webkit-box-shadow: 0 0 0px 1000px #ffffff inset !important;
      -webkit-text-fill-color: #1f2937 !important;
    }

    /* Tauri window drag region */
    .tauri-drag {
      -webkit-app-region: drag;
    }

    .tauri-no-drag {
      -webkit-app-region: no-drag;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
